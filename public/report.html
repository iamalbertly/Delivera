<!DOCTYPE html>
<!-- SIZE-EXEMPT: Single report page structure; feedback panel extracted to JS-injected component. -->
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VodaAgileBoard - Performance - History (General Performance)</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <header>
      <div class="header-row">
        <div>
          <h1>General Performance</h1>
          <p id="report-subtitle" class="subtitle">History mission control for squads, range, and delivery signals.</p>
        </div>
        <div id="report-header-actions" class="report-header-actions">
          <button type="button" class="btn btn-secondary btn-compact" data-action="toggle-filters">Edit filters</button>
        </div>
      </div>
      <div id="report-filter-strip" class="report-filter-strip" data-context-bar="true" aria-live="polite">
        <div id="report-filter-strip-summary" class="report-filter-strip-summary">Filter by: projects, range, rules</div>
      </div>
      <div id="feedback-panel" class="feedback-panel" style="display: none;"></div>
    </header>


    <div class="main-layout">
      <!-- Filters Panel -->
      <aside class="filters-panel" id="filters-panel">
        <!-- M12: Prominent filter pill on mobile — count badge + show/hide toggle -->
        <div class="filters-panel-collapsed-bar" id="filters-panel-collapsed-bar"
          aria-hidden="true">
          <div id="filters-collapsed-summary" class="filters-collapsed-summary"></div>
          <span class="filters-active-count-badge" aria-live="polite"></span>
          <button type="button" class="btn btn-secondary btn-compact" data-action="toggle-filters">Show filters</button>
        </div>
        <div class="filters-panel-body" id="filters-panel-body">
          <div class="report-primary-filters-grid">
            <div class="filter-group filter-group-who">
              <h3>Who</h3>
              <div class="project-tools">
                <div class="search-input-wrap">
                  <input type="text" id="project-search" placeholder="Filter projects..." aria-label="Filter projects">
                  <button type="button" class="search-clear-btn" data-target="project-search"
                    aria-label="Clear project filter" title="Clear">Clear</button>
                </div>
                <div id="projects-selection-status" class="selection-status"></div>
                <div id="projects-no-match" class="selection-status" style="display: none;">No projects match your search.
                </div>
              </div>
              <p class="project-group-label"><small>Core squads</small></p>
              <label class="checkbox-label">
                <input type="checkbox" id="project-mpsa" class="project-checkbox" data-project="MPSA" checked>
                <span class="project-code">MPSA</span>
                <span class="project-desc">M-SQUAD</span>
                <span class="project-inline-tag">Core</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="project-mas" class="project-checkbox" data-project="MAS" checked>
                <span class="project-code">MAS</span>
                <span class="project-desc">Mini - Apps Squad</span>
                <span class="project-inline-tag">Core</span>
              </label>
              <p class="project-group-label"><small>Other squads</small></p>
              <div id="other-squads-group">
                <label class="checkbox-label">
                  <input type="checkbox" id="project-rpa" class="project-checkbox" data-project="RPA">
                  <span class="project-code">RPA</span>
                  <span class="project-desc">Robotics Process Automation (RPA)</span>
                  <span class="project-inline-tag">Other</span>
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="project-mva" class="project-checkbox" data-project="MVA">
                  <span class="project-code">MVA</span>
                  <span class="project-desc">Digital Squad</span>
                  <span class="project-inline-tag">Other</span>
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="project-asg" class="project-checkbox" data-project="ASG">
                  <span class="project-code">ASG</span>
                  <span class="project-desc">Agile and Security Guild</span>
                  <span class="project-inline-tag">Other</span>
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="project-fin" class="project-checkbox" data-project="FIN">
                  <span class="project-code">FIN</span>
                  <span class="project-desc">Finance Squad</span>
                  <span class="project-inline-tag">Other</span>
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="project-sd" class="project-checkbox" data-project="SD">
                  <span class="project-code">SD</span>
                  <span class="project-desc">DMS Squad (Kilimanjaro Legends)</span>
                  <span class="project-inline-tag">Other</span>
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="project-mpsa2" class="project-checkbox" data-project="MPSA2">
                  <span class="project-code">MPSA2</span>
                  <span class="project-desc">TRANSFORMERS</span>
                  <span class="project-inline-tag">Other</span>
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="project-trs" class="project-checkbox" data-project="TRS">
                  <span class="project-code">TRS</span>
                  <span class="project-desc">T-Squad</span>
                  <span class="project-inline-tag">Other</span>
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="project-vb" class="project-checkbox" data-project="VB">
                  <span class="project-code">VB</span>
                  <span class="project-desc">Vodacom Business</span>
                  <span class="project-inline-tag">Other</span>
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="project-ams2" class="project-checkbox" data-project="AMS2">
                  <span class="project-code">AMS2</span>
                  <span class="project-desc">AMS Squad (Tachyons)</span>
                  <span class="project-inline-tag">Other</span>
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="project-bio" class="project-checkbox" data-project="BIO">
                  <span class="project-code">BIO</span>
                  <span class="project-desc">Bio metric KYC &amp; KYA</span>
                  <span class="project-inline-tag">Other</span>
                </label>
              </div>
            </div>

            <div class="filter-group filter-group-when">
              <h3>When</h3>
              <div class="report-range-bar">
                <div class="quick-range-strip" role="group" aria-label="Date range">
                  <div class="quarter-strip-inner" style="overflow-x: auto; display: flex; gap: 6px; flex-wrap: nowrap;">
                  </div>
                </div>
                <div id="date-range-summary-wrap" class="date-range-summary-wrap">
                  <span id="date-range-summary" class="date-range-summary" aria-live="polite"></span>
                </div>
              </div>
              <div id="date-range-custom-wrap" class="date-range-custom-wrap">
                <label>Start <input type="datetime-local" id="start-date"></label>
                <label>End <input type="datetime-local" id="end-date"></label>
              </div>
              <div class="date-display" id="date-display" hidden></div>
            </div>
          </div>
          </div>

          <div class="filter-group filter-group-rules report-secondary-filters-row">
            <details class="report-rules-tile" id="report-rules-tile">
              <summary id="advanced-options-toggle" class="report-rules-summary" aria-controls="advanced-options">
                <span>Rules &amp; strictness</span>
                <span id="rules-summary-inline" class="rules-summary-inline">Optional</span>
              </summary>
              <div id="advanced-options" class="advanced-options">
                <label class="toggle-label">
                  <input type="checkbox" id="require-resolved-by-sprint-end">
                  <span>Require Resolved by Sprint End</span>
                </label>
                <label class="toggle-label">
                  <input type="checkbox" id="include-predictability">
                  <span>Include Predictability</span>
                </label>
                <div id="predictability-mode-group" style="display: none; margin-left: 20px; margin-top: 8px;">
                  <label class="radio-label">
                    <input type="radio" name="predictability-mode" value="approx" checked>
                    <span>Approximation</span>
                  </label>
                  <label class="radio-label">
                    <input type="radio" name="predictability-mode" value="strict">
                    <span>Strict</span>
                  </label>
                </div>
                <label class="toggle-label">
                  <input type="checkbox" id="include-active-or-missing-end-date-sprints">
                  <span>Include Active/Missing End Date Sprints</span>
                </label>
              </div>
            </details>
          </div>

            <div id="report-filters-status-bar" class="report-filters-status-bar" aria-live="polite">
              <div id="applied-filters-summary" class="applied-filters-summary"></div>
              <div class="applied-filters-chips-row" id="applied-filters-chips-row">
                <div id="applied-filters-chips" class="applied-filters-chips"></div>
              </div>
              <p id="range-hint" class="range-hint" style="display: none;"></p>
            </div>
          </div>
          <div class="button-group filters-actions report-secondary-filters-row">
            <button id="preview-btn" class="btn btn-primary" title="Generate report for selected filters.">Preview
              report</button>
            <button type="button" id="reset-filters-btn" class="btn btn-secondary btn-compact"
              data-action="reset-filters" title="Clear project selection and reset date range">Reset filters</button>
            <div id="export-hint" class="export-hint"></div>
          </div>
          <p id="report-context-line" class="report-context-line" aria-live="polite">No report run yet</p>
          
     <!-- Preview Area -->
     <main id="main-content" class="preview-area">
      <span id="report-load-latest-wrap" class="report-load-latest-wrap" style="display: none;"><button type="button" class="link-style" data-action="load-latest-preview" id="report-load-latest-btn" aria-label="Run preview to load latest data">Load latest</button></span>
      <div id="loading" class="loading loading-skeleton" style="display: none;" aria-live="polite" aria-busy="true">
        <!-- M3: Filter context bar — confirms which filters are loading -->
        <div id="loading-context-bar" class="loading-context-bar" aria-live="polite"></div>
        <div class="loading-progress-wrap">
          <div class="loading-progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"
            aria-label="Report loading progress">
            <div id="loading-progress-fill" class="loading-progress-fill" style="width: 0%;"></div>
          </div>
          <p id="loading-message" class="loading-stage-label">Connecting to Jira…</p>
          <p id="loading-step-cue" class="loading-step-cue" aria-live="polite" hidden></p>
        </div>
        <div class="skeleton-preview skeleton-preview-compact" aria-hidden="true">
          <div class="skeleton-block skeleton-table">
            <div class="skeleton-line skeleton-table-header"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line"></div>
          </div>
        </div>
      </div>

      <div id="error" class="error alert alert-error" style="display: none;"></div>

      <div id="preview-content" style="display: none;">
        <div class="preview-header">
          <div id="preview-meta"></div>
          <div class="preview-header-export-wrap"><button type="button" id="export-excel-btn" class="btn btn-secondary btn-compact"
              data-action="trigger-export-excel" title="Share or export this report." disabled
              aria-label="Share or export report">Export options</button>
            <button id="export-dropdown-trigger" class="btn btn-secondary btn-compact export-dropdown-trigger"
              aria-haspopup="true" aria-expanded="false" aria-controls="export-dropdown-menu"
              aria-label="More export options" title="More export options: filtered view and CSV" disabled hidden>&#9662;</button>
            <div id="export-dropdown-menu" class="export-dropdown-menu" role="menu" aria-hidden="true"
              aria-label="Export options">
              <button type="button" class="export-dropdown-item" data-export="excel-full" role="menuitem">Full report (Excel)</button>
              <button type="button" class="export-dropdown-item" data-export="csv-outcomes-only" role="menuitem"
                title="Export done stories only">Outcomes only (CSV)</button>
              <button type="button" class="export-dropdown-item" data-export="csv-active-tab" role="menuitem"
                title="Export only the currently selected tab.">Current tab (CSV)</button>
              <button type="button" class="export-dropdown-item" data-export="csv-filtered" role="menuitem"
                title="Exports only rows visible after applying search and filters in this tab.">Export CSV
                (filtered)</button>
              <button type="button" class="export-dropdown-item" data-export="excel-filtered" role="menuitem"
                title="Only rows currently visible in this tab (after filters).">Export to Excel (filtered)</button>
            </div>
          </div>
          <div id="preview-status" class="preview-status" style="display: none;"></div>
        </div>
        <div id="preview-summary-sticky" class="preview-summary-sticky" aria-hidden="true"></div>
        <div id="preview-status-strip" class="preview-status-strip" aria-live="polite"></div>
        <!-- Tabs: Overview → Leadership → Sprints → Outcomes → Excluded -->
        <div class="tabs" role="tablist">
          <button id="tab-btn-project-epic-level" class="tab-btn active" data-tab="project-epic-level" role="tab"
            aria-selected="true" aria-controls="tab-project-epic-level" tabindex="0">
            <span class="tab-btn-label">Overview</span>
          </button>
          <button id="tab-btn-trends" class="tab-btn" data-tab="trends" role="tab" aria-selected="false"
            aria-controls="tab-trends" tabindex="-1">
            <span class="tab-btn-label">Leadership trends</span>
          </button>
          <button id="tab-btn-sprints" class="tab-btn" data-tab="sprints" role="tab" aria-selected="false"
            aria-controls="tab-sprints" tabindex="-1">
            <span class="tab-btn-label">Sprints</span>
          </button>
          <button id="tab-btn-done-stories" class="tab-btn" data-tab="done-stories" role="tab"
            aria-selected="false" aria-controls="tab-done-stories" tabindex="-1">
            <span class="tab-btn-label">Outcomes</span>
          </button>
          <button id="tab-btn-unusable-sprints" class="tab-btn" data-tab="unusable-sprints" role="tab"
            aria-selected="false" aria-controls="tab-unusable-sprints" tabindex="-1">
            <span class="tab-btn-label">Repair center</span>
          </button>
        </div>          <div class="report-unified-tab-search">
          <div class="search-input-wrap">
            <input type="text" id="report-tab-search" placeholder="Search current view" aria-label="Search current view">
            <button type="button" class="search-clear-btn" data-target="report-tab-search" aria-label="Clear tab search" title="Clear">Clear</button>
          </div>
        </div>

        <!-- Tab Content -->
        <div class="tab-content">
          <div id="tab-project-epic-level" class="tab-pane" role="tabpanel"
            aria-labelledby="tab-btn-project-epic-level">
            <div class="boards-controls done-stories-controls report-tab-search-legacy" aria-hidden="true" hidden>
              <div class="search-input-wrap">
                <input type="text" id="boards-search-box" placeholder="Search boards by name or ID..."
                  aria-label="Search boards by name or ID">
                <button type="button" class="search-clear-btn" data-target="boards-search-box"
                  aria-label="Clear boards search" title="Clear">Clear</button>
              </div>
              <div class="project-pills" id="boards-project-pills"></div>
            </div>
            <div id="project-epic-level-content"></div>
          </div>

          <div id="tab-sprints" class="tab-pane" role="tabpanel" aria-labelledby="tab-btn-sprints">
            <div class="sprints-controls done-stories-controls report-tab-search-legacy" aria-hidden="true" hidden>
              <div class="search-input-wrap">
                <input type="text" id="sprints-search-box" placeholder="Search sprints by name..."
                  aria-label="Search sprints by name">
                <button type="button" class="search-clear-btn" data-target="sprints-search-box"
                  aria-label="Clear sprints search" title="Clear">Clear</button>
              </div>
              <div class="project-pills" id="sprints-project-pills"></div>
            </div>
            <div id="sprints-content"></div>
          </div>

          <div id="tab-done-stories" class="tab-pane" role="tabpanel" aria-labelledby="tab-btn-done-stories">
            <div class="done-stories-controls report-tab-search-legacy" aria-hidden="true" hidden>
              <div class="search-input-wrap search-unified-only" aria-hidden="true" style="display: none;">
                <input type="text" id="search-box" placeholder="Search by key or summary..."
                  aria-label="Search done stories">
                <button type="button" class="search-clear-btn" data-target="search-box"
                  aria-label="Clear done stories search" title="Clear">Clear</button>
              </div>
              <div id="done-stories-visibility-summary" class="done-stories-visibility-summary" aria-live="polite"></div>
              <div class="project-pills" id="project-pills"></div>
              <button type="button" class="btn btn-secondary btn-compact" id="done-stories-columns-toggle"
                data-action="toggle-done-stories-optional-columns" aria-expanded="false"
                title="Subtask Est, Spent, Remaining, Variance">Show more columns (4)</button>
            <button type="button" class="btn btn-secondary btn-compact" id="done-stories-quarter-review-toggle"
                data-action="toggle-done-stories-quarter-review" aria-pressed="false"
                title="Expand all sprints into a single scrollable list">Quarter review mode</button>
            <button type="button" class="btn btn-secondary btn-compact" id="done-stories-export-only-btn"
                data-action="export-done-stories-focused" title="Export focused CSV for Outcomes only" style="display: none;" aria-hidden="true" hidden>Export Outcomes CSV</button>
            </div>
            <div id="done-stories-content"></div>
            <div id="done-stories-totals" class="totals-bar"></div>
          </div>


          <div id="tab-unusable-sprints" class="tab-pane" role="tabpanel" aria-labelledby="tab-btn-unusable-sprints">
            <div id="unusable-sprints-content"></div>
          </div>

          <div id="tab-trends" class="tab-pane" role="tabpanel" aria-labelledby="tab-btn-trends">
            <div id="leadership-content"></div>
          </div>
        </div>
      </div>
    </main>
        </div>
      </aside>


     
    </div>
  </div>

  <div id="loading-status-chip" class="loading-status-chip" aria-live="polite" style="display: none;"></div>
  <div id="tooltip-popover" class="tooltip-popover" role="tooltip" aria-hidden="true"></div>
  <script type="module" src="Reporting-App-Report-Page-Feedback-Panel-Inject.js"></script>
  <script type="module" src="Reporting-App-Shared-Global-Nav.js"></script>
  <script type="module" src="Reporting-App-Shared-UI-Header-Nav-Renderer.js"></script>
  <script type="module" src="Reporting-App-Report-Page-Init-Controller.js"></script>
</body>

</html>
