<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance - Current Sprint - VodaAgileBoard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Compact page header: single row with board select; header bar is the main strip */
    .current-sprint-header {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
    }
    .current-sprint-header h1 {
      color: var(--primary);
      font-size: 1.1rem;
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: baseline;
    }
    .current-sprint-header h1 .sprint-name {
      color: var(--accent);
      font-weight: 700;
      font-size: 1rem;
    }
    .current-sprint-header .subtitle {
      display: none;
    }
    .board-select-wrap {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 6px 10px;
    }
    .board-select-wrap label {
      font-weight: 500;
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .board-select-wrap select,
    .board-select-wrap input[type="text"] {
      padding: 6px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      min-width: 190px;
      font-size: 0.9rem;
    }
    #current-sprint-single-project-hint {
      display: block;
      margin-top: 2px;
      max-width: 360px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .transparency-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-soft, 0 4px 10px rgba(15, 23, 42, 0.04));
    }
    .transparency-card h2 {
      color: var(--primary);
      font-size: 1.05rem;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }
    .meta-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }
    .meta-row span { color: var(--muted); font-size: 0.85em; }
    .meta-row strong { color: var(--text); }
    .flag-warn { color: var(--warning); font-weight: 500; }
    .assumptions-list { list-style: none; padding-left: 0; margin: 0; }
    .assumptions-list li { padding: 3px 0; color: var(--muted); font-size: 0.9em; }
    .assumptions-list li::before { content: "• "; color: var(--primary); }
    .histogram-bar-wrap { margin-bottom: 6px; }
    .histogram-bar-wrap label { display: inline-block; min-width: 100px; font-size: 0.85em; color: var(--muted); }
    .histogram-bar { height: 14px; background: var(--primary); border-radius: 4px; min-width: 4px; display: inline-block; vertical-align: middle; }
    #current-sprint-loading,
    #current-sprint-error {
      padding: 20px;
      text-align: center;
      color: var(--muted);
    }
    #current-sprint-loading.current-sprint-loading-with-spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .current-sprint-loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: current-sprint-spin 0.8s linear infinite;
    }
    .current-sprint-loading-msg {
      margin: 0;
      font-size: 0.9rem;
    }
    @keyframes current-sprint-spin { to { transform: rotate(360deg); } }
    #current-sprint-error { color: var(--danger); }
    #current-sprint-content { display: none; }
    @media (min-width: 960px) {
      .current-sprint-header {
        flex-direction: row;
        justify-content: space-between;
        align-items: flex-start;
      }
      .board-select-wrap {
        max-width: 520px;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="current-sprint-header">
        <div>
          <h1><span id="current-sprint-title">Performance - Current Sprint</span> <span id="current-sprint-name" class="sprint-name"></span></h1>
          <p class="subtitle" id="current-sprint-subtitle">See sprint risks and act fast.</p>
        </div>
        <div class="board-select-wrap">
          <label for="current-sprint-projects">Project</label>
          <select id="current-sprint-projects" aria-label="Select project">
            <option value="MPSA">MPSA - M-SQUAD</option>
            <option value="MAS">MAS - Mini - Apps Squad</option>
            <option value="RPA">RPA - Robotics Process Automation (RPA)</option>
            <option value="MVA">MVA - Digital Squad</option>
            <option value="ASG">ASG - Agile and Security Guild</option>
            <option value="FIN">FIN - Finance Squad</option>
            <option value="SD">SD - DMS Squad (Kilimanjaro Legends)</option>
            <option value="MPSA2">MPSA2 - TRANSFORMERS</option>
            <option value="TRS">TRS - T-Squad</option>
            <option value="VB">VB - Vodacom Business</option>
            <option value="AMS2">AMS2 - AMS Squad (Tachyons)</option>
            <option value="BIO">BIO - Bio metric KYC &amp; KYA</option>
          </select>
          <label for="board-select">Board</label>
          <select id="board-select" aria-label="Select board">
            <option value="">Loading boards...</option>
          </select>
          <label for="issue-jump-input">Jump to issue</label>
          <input id="issue-jump-input" type="text" class="input-compact" placeholder="Paste /browse/KEY or KEY" aria-label="Paste Jira link or key to jump">
          <span id="current-sprint-single-project-hint" class="selection-status" aria-live="polite">Current Sprint runs in single-project mode for accuracy.</span>
        </div>
      </div>
    </header>

    <main id="main-content" data-current-sprint-state="welcome">
      <!-- M9: Sprint loading context — shows board + sprint name above spinner while loading -->
      <div id="sprint-loading-context" class="sprint-loading-context" aria-live="polite"></div>
      <div id="current-sprint-loading">Pick a project and board. Sprint view loads.</div>
      <div id="current-sprint-error" class="alert alert-error" style="display: none;"></div>
      <div id="current-sprint-content"></div>
    </main>
  </div>
  <script type="module" src="Reporting-App-Shared-Global-Nav.js"></script>
  <script type="module" src="Reporting-App-Shared-UI-Header-Nav-Renderer.js"></script>
  <script type="module" src="Reporting-App-CurrentSprint-Page-Init-Controller.js"></script>
</body>
</html>
