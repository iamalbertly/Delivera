<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance - Current Sprint - Delivera</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Compact page header: scope is a ribbon, not a card */
    body.current-sprint-page header {
      padding: 6px 12px;
      margin-bottom: 8px;
    }
    .current-sprint-header {
      display: block;
    }
    .current-sprint-page-title-wrap {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .board-select-wrap {
      display: block;
      width: 100%;
    }
    .current-sprint-scope-stack {
      width: 100%;
    }
    .current-sprint-scope-inline {
      display: flex;
      gap: 6px;
      align-items: center;
      min-width: 0;
    }
    .current-sprint-control-field {
      min-width: 0;
    }
    .current-sprint-control-field select,
    .current-sprint-control-field input[type="text"] {
      padding: 6px 9px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      min-width: 0;
      width: 100%;
      font-size: 0.88rem;
    }
    .current-sprint-scope-row {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .current-sprint-scope-row--compact {
      align-items: stretch;
      flex-wrap: nowrap;
    }
    .current-sprint-scope-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 7px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card-muted);
      color: var(--muted);
      font-size: 0.74rem;
      white-space: nowrap;
    }
    .current-sprint-jump-inline {
      flex: 1 1 180px;
      min-width: 180px;
    }
    .current-sprint-jump-inline input[type="text"] {
      padding: 6px 9px;
    }
    #current-sprint-single-project-hint { display: inline-flex; }
    .transparency-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-soft, 0 4px 10px rgba(15, 23, 42, 0.04));
    }
    .transparency-card h2 {
      color: var(--primary);
      font-size: 1.05rem;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }
    .meta-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }
    .meta-row span { color: var(--muted); font-size: 0.85em; }
    .meta-row strong { color: var(--text); }
    .flag-warn { color: var(--warning); font-weight: 500; }
    .assumptions-list { list-style: none; padding-left: 0; margin: 0; }
    .assumptions-list li { padding: 3px 0; color: var(--muted); font-size: 0.9em; }
    .assumptions-list li::before { content: "• "; color: var(--primary); }
    .histogram-bar-wrap { margin-bottom: 6px; }
    .histogram-bar-wrap label { display: inline-block; min-width: 100px; font-size: 0.85em; color: var(--muted); }
    .histogram-bar { height: 14px; background: var(--primary); border-radius: 4px; min-width: 4px; display: inline-block; vertical-align: middle; }
    #current-sprint-loading,
    #current-sprint-error {
      padding: 12px 14px;
      text-align: center;
      color: var(--muted);
      max-width: 720px;
      margin: 0 auto;
    }
    #current-sprint-loading.current-sprint-loading-with-spinner {
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 48px;
    }
    .current-sprint-loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: current-sprint-spin 0.8s linear infinite;
    }
    .current-sprint-loading-msg {
      margin: 0;
      font-size: 0.9rem;
    }
    @keyframes current-sprint-spin { to { transform: rotate(360deg); } }
    #current-sprint-error { color: var(--danger); }
    #current-sprint-content { display: none; }
    @media (min-width: 960px) {
      .current-sprint-header {
        display: block;
      }
    }
    @media (max-width: 1024px) {
      .current-sprint-scope-inline,
      .current-sprint-scope-row--compact {
        flex-wrap: wrap;
      }
    }
    @media (max-width: 720px) {
      .current-sprint-jump-inline {
        min-width: 0;
        flex: 1 1 100%;
      }
      .board-select-wrap {
        max-width: 100%;
        overflow-x: hidden;
      }
    }
  </style>
</head>
<body class="current-sprint-page">
  <div class="container">
    <header>
      <div class="current-sprint-header">
        <h1 class="current-sprint-page-title-wrap"><span id="current-sprint-title">Performance - Current Sprint</span> <span id="current-sprint-name" class="sprint-name"></span></h1>
        <div class="board-select-wrap">
          <div class="current-sprint-scope-stack">
            <div class="current-sprint-control-field">
              <div class="current-sprint-scope-row current-sprint-scope-row--compact">
                <div class="current-sprint-scope-inline">
                <select id="current-sprint-projects" aria-label="Select project">
                  <option value="MPSA">MPSA - M-SQUAD</option>
                  <option value="MAS">MAS - Mini - Apps Squad</option>
                  <option value="RPA">RPA - Robotics Process Automation (RPA)</option>
                  <option value="MVA">MVA - Digital Squad</option>
                  <option value="ASG">ASG - Agile and Security Guild</option>
                  <option value="FIN">FIN - Finance Squad</option>
                  <option value="SD">SD - DMS Squad (Kilimanjaro Legends)</option>
                  <option value="MPSA2">MPSA2 - TRANSFORMERS</option>
                  <option value="TRS">TRS - T-Squad</option>
                  <option value="VB">VB - Vodacom Business</option>
                  <option value="AMS2">AMS2 - AMS Squad (Tachyons)</option>
                  <option value="BIO">BIO - Bio metric KYC &amp; KYA</option>
                </select>
                <select id="board-select" aria-label="Select board">
                  <option value="">Loading boards...</option>
                </select>
                </div>
                <span id="current-sprint-single-project-hint" class="current-sprint-scope-badge" aria-live="polite">Using single-project mode</span>
                <div class="current-sprint-jump-inline">
                  <input id="issue-jump-input" type="text" class="input-compact" placeholder="Filter sprint work: KEY, URL, summary" aria-label="Filter sprint work by key, URL, or summary">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main id="main-content" data-current-sprint-state="welcome">
      <div id="current-sprint-ribbon" class="preview-status-strip" style="display: none;" aria-live="polite"></div>
      <!-- M9: Sprint loading context — shows board + sprint name above spinner while loading -->
      <div id="current-sprint-loading">
        <div class="current-sprint-loading-copy">Loading your last sprint HUD… adjust scope only if needed.</div>
      </div>
      <div id="current-sprint-error" class="alert alert-error" style="display: none;"></div>
      <div id="current-sprint-content"></div>
    </main>
  </div>
  <script type="module" src="Delivera-Shared-Runtime-Notification-Bridge.js"></script>
  <script type="module" src="Delivera-Shared-Global-Nav.js"></script>
  <script type="module" src="Delivera-Shared-UI-Header-Nav-Renderer.js"></script>
  <script type="module" src="Delivera-CurrentSprint-Page-Init-Controller.js"></script>
</body>
</html>
